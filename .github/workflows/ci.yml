name: Java CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v6

      # 2. Set up Java (v5, Eclipse Temurin 17)
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Verify Java installation
      - name: Verify Java
        run: java -version

      # 4. Compile Java project
      - name: Compile Java project
        run: javac src/application/*.java

      # 5. Build Docker image (dev)
      - name: Build Docker image
        run: docker build -f Dockerfile.dev -t hangman-java:dev .
